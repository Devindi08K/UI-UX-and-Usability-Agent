```html
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple To-Do List Application</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="h-screen bg-gray-100 flex items-center justify-center">
  <div class="max-w-md w-full mx-auto p-4 bg-white rounded-lg shadow-md">
    <h1 class="text-lg font-bold mb-2">To-Do List</h1>
    <form id="add-task-form" class="mb-4">
      <input type="text" id="new-task" class="w-full p-2 pl-10 text-sm text-gray-700 rounded-lg focus:outline-none focus:ring-2 focus:ring-gray-600" placeholder="Add new task">
      <button type="submit" class="absolute left-0 top-0 ml-2 mt-2 text-gray-600 hover:text-gray-900">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6" />
        </svg>
      </button>
    </form>
    <ul id="task-list" class="mb-4">
      <!-- tasks will be added here -->
    </ul>
    <script>
      const taskList = document.getElementById('task-list');
      const addTaskForm = document.getElementById('add-task-form');
      const newTaskInput = document.getElementById('new-task');

      let tasks = [];

      addTaskForm.addEventListener('submit', (e) => {
        e.preventDefault();
        const taskText = newTaskInput.value.trim();
        if (taskText) {
          tasks.push({ text: taskText, completed: false });
          renderTaskList();
          newTaskInput.value = '';
        }
      });

      function renderTaskList() {
        taskList.innerHTML = '';
        tasks.forEach((task, index) => {
          const taskElement = document.createElement('li');
          taskElement.classList.add('flex', 'items-center', 'py-2', 'pl-3', 'pr-4', 'text-gray-700', 'hover:bg-gray-100');
          if (task.completed) {
            taskElement.classList.add('text-gray-500', 'line-through');
          }
          taskElement.innerHTML = `
            <input type="checkbox" class="mr-2" ${task.completed ? 'checked' : ''}>
            <span>${task.text}</span>
            <button type="button" class="ml-auto text-gray-600 hover:text-gray-900">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
              </svg>
            </button>
          `;
          taskList.appendChild(taskElement);

          const checkbox = taskElement.querySelector('input[type="checkbox"]');
          checkbox.addEventListener('change', () => {
            tasks[index].completed = checkbox.checked;
            renderTaskList();
          });

          const deleteButton = taskElement.querySelector('button');
          deleteButton.addEventListener('click', () => {
            tasks.splice(index, 1);
            renderTaskList();
          });
        });
      }
    </script>
  </div>
</body>
</html>
```
